<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main blue→teal gradient (top to bottom) -->
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A66BF"/>
      <stop offset="100%" stop-color="#21CCB8"/>
    </linearGradient>
    <!-- Same gradient for stroke use -->
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A66BF"/>
      <stop offset="100%" stop-color="#21CCB8"/>
    </linearGradient>
  </defs>

  <!-- ═══ DROP BODY — Alef stroke of إ, stylised as a liquid teardrop ═══ -->
  <!-- 176×352px, centered at x=256, top y=96, tip y=448 -->
  <path
    d="M 256 448
       C 207.6 360, 168 228, 168 184
       C 168 135.4, 207.4 96, 256 96
       C 304.6 96, 344 135.4, 344 184
       C 344 228, 304.4 360, 256 448 Z"
    fill="url(#g1)"
  />

  <!-- ═══ INNER GLEAM — white oval highlight inside drop ═══ -->
  <ellipse
    cx="212" cy="176"
    rx="28" ry="38"
    fill="white" opacity="0.22"
    transform="rotate(-15 212 176)"
  />

  <!-- ═══ HAMZA ARC (ء) — open arc floating top-right, completes the إ ═══ -->
  <!-- Stroke-only crescent, no fill -->
  <path
    d="M 316 58 C 316 8, 408 8, 408 58"
    fill="none"
    stroke="url(#g2)"
    stroke-width="22"
    stroke-linecap="round"
  />

  <!-- ═══ SPARK — 4-point star, top-left of drop ═══ -->
  <path
    d="M 128 64
       L 139.3 92.7
       L 168 104
       L 139.3 115.3
       L 128 144
       L 116.7 115.3
       L 88 104
       L 116.7 92.7 Z"
    fill="url(#g1)"
  />

  <!-- ═══ SMALL DOT accent on spark ═══ -->
  <circle cx="128" cy="104" r="8" fill="white" opacity="0.6"/>
</svg>
